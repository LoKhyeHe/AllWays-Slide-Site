name: pitch_deck
description: "Pitch deck presentation with slide navigation and PDF export."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  pdf: ^3.11.0
  printing: ^5.13.1
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/images/
    - lib/images/Logo/
    - lib/images/Headshots/
