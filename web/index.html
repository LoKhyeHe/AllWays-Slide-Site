  <noscript>
    <h1>AllWays — Indoor Navigation for the Visually Impaired</h1>
    <p>
      AllWays is an indoor navigation system that guides visually impaired
      users through touch. It combines ultra-wideband (UWB) positioning,
      accurate to within ~30&nbsp;cm indoors, with a haptic belt that gives
      directional vibration cues — left, right, forward, stop — so users can
      navigate with zero visual attention required.
    </p>
    <p>

      and Design (SUTD), in collaboration with TechAble, AWWA and SAVH.
